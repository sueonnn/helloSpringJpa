<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 카테고리 등록 - Product Management</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #2d8f6f; padding-bottom: 10px; color: #23423a; }
        .back-btn { display: inline-block; padding: 8px 16px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 24px; }
        .back-btn:hover { background: #545b62; }
        .form-card { border: 1px solid #d9e7e1; border-radius: 8px; padding: 24px; background: #fbfefd; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; color: #495057; }
        input[type="text"] {
            width: 100%; padding: 10px 12px; border: 1px solid #ced4da;
            border-radius: 4px; font-size: 1em; box-sizing: border-box;
            font-family: inherit;
        }
        input:focus {
            outline: none; border-color: #2d8f6f; box-shadow: 0 0 0 3px rgba(45,143,111,0.15);
        }
        .field-error { border-color: #e74c3c !important; }
        .error-msg { color: #e74c3c; font-size: 0.85em; margin-top: 5px; display: block; }
        .help-text { color: #6c757d; font-size: 0.9em; line-height: 1.6; margin: 0; }
        .btn-submit { background: #2d8f6f; color: white; border: none; padding: 12px 32px; font-size: 1em; border-radius: 4px; cursor: pointer; }
        .btn-submit:hover { background: #246f57; }
        .page-footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #ddd; color: #666; font-size: 0.95em; text-align: center; }
    </style>
</head>
<body>

    <h1>새 카테고리 등록</h1>

    <a class="back-btn" th:href="@{/categories}">← 카테고리 목록으로 돌아가기</a>

    <div class="form-card">
        <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
            <div class="form-group">
                <label for="name">카테고리명</label>
                <input type="text"
                       th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'field-error'"
                       placeholder="예: 전자제품" />
                <span class="error-msg"
                      th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}">카테고리명 오류</span>
            </div>
            <div class="form-group">
                <button type="submit" class="btn-submit">카테고리 등록</button>
            </div>
        </form>
    </div>

    <footer class="page-footer">
        <p id="practice-datetime"
           th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss') + ' | 학번: 2291072 | 성명: 정수연'}">
            실습 수행 일시: 2026년 04월 16일 22:00:00 | 학번: 2291072 | 성명: 정수연
        </p>
    </footer>
</body>
</html>
