<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 목록 - Product Management</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #2d8f6f; padding-bottom: 10px; color: #23423a; }
        .btn { display: inline-block; padding: 8px 16px; background: #2d8f6f; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 16px; }
        .btn:hover { background: #246f57; }
        .sub-link { display: inline-block; margin-left: 8px; color: #2d8f6f; text-decoration: none; }
        .sub-link:hover { text-decoration: underline; }
        .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 12px 16px; border-radius: 4px; margin-bottom: 16px; }
        .alert-error { background: #f8d7da; border: 1px solid #f5c2c7; color: #842029; padding: 12px 16px; border-radius: 4px; margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th { background: #2d8f6f; color: white; padding: 12px; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background: #f4fbf8; }
        .btn-delete { background: none; border: none; color: #c0392b; cursor: pointer; font-size: 0.95em; padding: 0; text-decoration: underline; }
        .btn-delete:hover { color: #962d22; }
        .empty-msg { text-align: center; padding: 40px; color: #999; font-size: 1.05em; }
        .page-footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #ddd; color: #666; font-size: 0.95em; text-align: center; }
    </style>
</head>
<body>

    <h1>카테고리 목록</h1>

    <div class="alert-success" th:if="${successMessage}">
        <span th:text="${successMessage}">성공 메시지</span>
    </div>

    <div class="alert-error" th:if="${errorMessage}">
        <span th:text="${errorMessage}">오류 메시지</span>
    </div>

    <a class="btn" th:href="@{/categories/create}">+ 새 카테고리 등록</a>
    <a class="sub-link" th:href="@{/products}">상품 목록으로 이동</a>

    <div class="empty-msg" th:if="${#lists.isEmpty(categories)}">
        등록된 카테고리가 없습니다.
    </div>

    <table th:unless="${#lists.isEmpty(categories)}">
        <thead>
            <tr>
                <th>ID</th>
                <th>카테고리명</th>
                <th>작업</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="category : ${categories}">
                <td th:text="${category.id}">1</td>
                <td th:text="${category.name}">전자제품</td>
                <td>
                    <form th:action="@{/categories/{id}/delete(id=${category.id})}"
                          method="post"
                          style="display: inline;"
                          onsubmit="return confirm('정말 삭제하시겠습니까?');">
                        <button type="submit" class="btn-delete">삭제</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <th:block th:replace="~{fragments/footer :: practiceFooter('2291072', '정수연')}"></th:block>
</body>
</html>
